<?xml version="1.0" encoding="UTF-8"?>
<svg width="240" height="80" viewBox="0 0 240 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ffff" />
      <stop offset="100%" stop-color="#8000ff" />
    </linearGradient>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Network node lines (thin) -->
  <line x1="20" y1="20" x2="35" y2="35" stroke="#00ffff" stroke-width="0.5" />
  <line x1="35" y1="35" x2="50" y2="20" stroke="#00ffff" stroke-width="0.5" />
  <line x1="190" y1="20" x2="205" y2="35" stroke="#8000ff" stroke-width="0.5" />
  <line x1="205" y1="35" x2="220" y2="20" stroke="#8000ff" stroke-width="0.5" />
  <text x="50%" y="60%" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="44" font-weight="800" fill="url(#grad)" filter="url(#neon)">NetComic</text>
</svg>
